name: "Test: L2 Callback Edge Cases"

# Rate limit budget: 21 callbacks total, serialized into 3 waves via needs:.
# Target: max ~6 callbacks/min per dispatch (safe for 3+ concurrent dispatches at 20/min).
# Wave 1 starts at ~310s offset with 45s jitter; waves 2/3 wait for prior wave.
# Wide jitter (RANDOM % 45-60) desynchronizes callbacks from concurrent dispatches.
# Wave 1: ec01, ec03, ec05-a, ec05-b (7 callbacks, 15s stagger + 45s jitter)
# Wave 2: ec06, tr01, tr02, tr03 (8 callbacks, 20s stagger + 25s jitter)
# Wave 3: payload04, payload05, size04 (6 callbacks, 20s stagger + 25s jitter)

on:
  repository_dispatch:
    types:
      - pull_request
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (manual testing)"
        required: false
        default: "0"

run-name: >-
  [Test L2 Edge] ${{
    github.event.client_payload.event_type == 'pull_request' &&
    format('PR #{0}',
      github.event.client_payload.payload.pull_request.number) ||
    'Manual trigger'
  }}

concurrency:
  group: >-
    test-l2-edge-${{ github.event.client_payload.payload.repository.full_name || 'manual' }}-${{
    github.event.client_payload.payload.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write
  id-token: write

jobs:
  cancel-workflow:
    if: ${{ github.event.client_payload.payload.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR closed — canceling older runs"

  # =============================================
  # WAVE 1: ec01, ec03, ec05-a, ec05-b (~7 callbacks)
  # Starts at ~310s offset from dispatch to avoid overlap with other workflows
  # =============================================

  ec01-missing-oidc:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    continue-on-error: true
    steps:
      - name: "Throttle: 310s base + wide jitter to desync concurrent dispatches"
        run: sleep $(( 310 + RANDOM % 45 ))

      - name: "EC-01: Attempt callback without OIDC permission"
        id: no_oidc
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "EC-01: Verify OIDC failure"
        run: |
          echo "## EC-01: Missing OIDC Permission" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.no_oidc.outcome }}" = "failure" ]; then
            echo "✅ Callback correctly failed without id-token:write permission" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Callback unexpectedly succeeded without OIDC" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  ec03-empty-test-results:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 1 stagger + wide jitter"
        run: sleep $(( 325 + RANDOM % 45 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "EC-03: Report completed without test-results"
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success

      - name: "EC-03: Verify success"
        run: |
          echo "## EC-03: Empty Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Callback succeeded without test-results field" >> $GITHUB_STEP_SUMMARY

  ec05-multi-job-a:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 1 stagger + wide jitter"
        run: sleep $(( 340 + RANDOM % 45 ))

      - name: Report in_progress (Job A)
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: Simulate work (Job A)
        run: sleep 3

      - name: Report completed (Job A)
        if: always()
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success
          test-results: '{"passed": 10, "failed": 0, "skipped": 0, "total": 10}'

      - name: "EC-05: Job A result"
        if: always()
        run: |
          echo "## EC-05: Multi-Job — Job A" >> $GITHUB_STEP_SUMMARY
          echo "✅ Job A (check_run_id=\`${{ job.check_run_id }}\`) completed callback sent" >> $GITHUB_STEP_SUMMARY

  ec05-multi-job-b:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 1 stagger + wide jitter"
        run: sleep $(( 355 + RANDOM % 45 ))

      - name: Report in_progress (Job B)
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: Simulate work (Job B)
        run: sleep 5

      - name: Report completed (Job B)
        if: always()
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success
          test-results: '{"passed": 20, "failed": 1, "skipped": 2, "total": 23}'

      - name: "EC-05: Job B result"
        if: always()
        run: |
          echo "## EC-05: Multi-Job — Job B" >> $GITHUB_STEP_SUMMARY
          echo "✅ Job B (check_run_id=\`${{ job.check_run_id }}\`) completed callback sent" >> $GITHUB_STEP_SUMMARY

  # =============================================
  # WAVE 2: ec06, tr01, tr02, tr03 (~8 callbacks)
  # Waits for wave 1 to finish, staggered 20s apart with 25-30s jitter
  # =============================================

  ec06-always-on-failure:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec01-missing-oidc, ec03-empty-test-results, ec05-multi-job-a, ec05-multi-job-b]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 2 entry jitter"
        run: sleep $(( 15 + RANDOM % 30 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: Simulate build failure
        id: build
        run: |
          echo "Build failed intentionally"
          exit 1
        continue-on-error: true

      - name: "EC-06: Report completed after failure (always)"
        if: always()
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: failure
          test-results: '{"passed": 0, "failed": 0, "skipped": 0, "total": 0}'

      - name: "EC-06: Verify callback fired after failure"
        if: always()
        run: |
          echo "## EC-06: always() Callback on Failure" >> $GITHUB_STEP_SUMMARY
          echo "✅ completed callback with conclusion=failure sent after build step failed" >> $GITHUB_STEP_SUMMARY

  tr01-full-test-results:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec01-missing-oidc, ec03-empty-test-results, ec05-multi-job-a, ec05-multi-job-b]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 2 stagger"
        run: sleep $(( 35 + RANDOM % 25 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "TR-01: Send completed with all test_results fields"
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success
          test-results: '{"passed": 100, "failed": 5, "skipped": 10, "total": 115}'

      - name: "TR-01: Summary"
        run: |
          echo "## TR-01: Full Test Results" >> $GITHUB_STEP_SUMMARY
          echo "✅ Sent: passed=100, failed=5, skipped=10, total=115" >> $GITHUB_STEP_SUMMARY
          echo "Verify in ClickHouse: all 4 fields stored correctly" >> $GITHUB_STEP_SUMMARY

  tr02-computed-total:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec01-missing-oidc, ec03-empty-test-results, ec05-multi-job-a, ec05-multi-job-b]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 2 stagger"
        run: sleep $(( 55 + RANDOM % 25 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "TR-02: Send completed without total field"
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success
          test-results: '{"passed": 80, "failed": 3, "skipped": 7}'

      - name: "TR-02: Summary"
        run: |
          echo "## TR-02: Computed Total" >> $GITHUB_STEP_SUMMARY
          echo "✅ Sent: passed=80, failed=3, skipped=7 (no total)" >> $GITHUB_STEP_SUMMARY
          echo "Verify in ClickHouse: total_tests should be 90 (80+3+7)" >> $GITHUB_STEP_SUMMARY

  tr03-results-on-in-progress:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec01-missing-oidc, ec03-empty-test-results, ec05-multi-job-a, ec05-multi-job-b]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 2 stagger"
        run: sleep $(( 75 + RANDOM % 25 ))

      - name: "TR-03: Send in_progress with test_results (should be ignored)"
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress
          test-results: '{"passed": 999, "failed": 999, "skipped": 999, "total": 2997}'

      - name: "TR-03: Send completed without test_results"
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success

      - name: "TR-03: Summary"
        run: |
          echo "## TR-03: Test Results on in_progress" >> $GITHUB_STEP_SUMMARY
          echo "✅ Sent test_results with in_progress, then completed without test_results" >> $GITHUB_STEP_SUMMARY
          echo "Verify: test result fields should be empty/null (in_progress results ignored)" >> $GITHUB_STEP_SUMMARY

  # =============================================
  # WAVE 3: payload04, payload05, size04 (~6 callbacks)
  # Waits for wave 2 to finish, staggered 20s apart with 25-30s jitter
  # =============================================

  payload04-cancelled:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec06-always-on-failure, tr01-full-test-results, tr02-computed-total, tr03-results-on-in-progress]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 3 entry jitter"
        run: sleep $(( 15 + RANDOM % 30 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "PAYLOAD-04: Report completed with conclusion=cancelled"
        id: cancelled_cb
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: cancelled

      - name: "PAYLOAD-04: Summary"
        if: always()
        run: |
          echo "## PAYLOAD-04: conclusion=cancelled" >> $GITHUB_STEP_SUMMARY
          OUTCOME="${{ steps.cancelled_cb.outcome }}"
          if [ "$OUTCOME" = "success" ]; then
            echo "✅ Callback accepted conclusion=cancelled" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Callback rejected conclusion=cancelled (outcome=$OUTCOME)" >> $GITHUB_STEP_SUMMARY
            echo "The action restricts conclusion to [success, failure]." >> $GITHUB_STEP_SUMMARY
            echo "See: https://github.com/pytorch/crcr-test/issues/7 (expand valid conclusions)" >> $GITHUB_STEP_SUMMARY
          fi

  payload05-timed-out:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec06-always-on-failure, tr01-full-test-results, tr02-computed-total, tr03-results-on-in-progress]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 3 stagger"
        run: sleep $(( 40 + RANDOM % 25 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "PAYLOAD-05: Report completed with conclusion=timed_out"
        id: timedout_cb
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: timed_out

      - name: "PAYLOAD-05: Summary"
        if: always()
        run: |
          echo "## PAYLOAD-05: conclusion=timed_out" >> $GITHUB_STEP_SUMMARY
          OUTCOME="${{ steps.timedout_cb.outcome }}"
          if [ "$OUTCOME" = "success" ]; then
            echo "✅ Callback accepted conclusion=timed_out" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Callback rejected conclusion=timed_out (outcome=$OUTCOME)" >> $GITHUB_STEP_SUMMARY
            echo "The action restricts conclusion to [success, failure]." >> $GITHUB_STEP_SUMMARY
            echo "See: https://github.com/pytorch/crcr-test/issues/7 (expand valid conclusions)" >> $GITHUB_STEP_SUMMARY
          fi

  size04-oversized-payload:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    needs: [ec06-always-on-failure, tr01-full-test-results, tr02-computed-total, tr03-results-on-in-progress]
    runs-on: ubuntu-latest
    steps:
      - name: "Throttle: wave 3 stagger"
        run: sleep $(( 65 + RANDOM % 25 ))

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: "SIZE-04: Generate ~2.5MB test_results"
        id: gen_large
        run: |
          python3 -c "
          import json
          big = 'x' * (2 * 1024 * 1024)
          print(json.dumps({'passed': 1, 'failed': 0, 'skipped': 0, 'total': 1, 'details': big}))
          " > /tmp/huge_results.json
          SIZE=$(wc -c < /tmp/huge_results.json)
          echo "Generated payload: ${SIZE} bytes (~$(( SIZE / 1024 / 1024 ))MB)"

      - name: "SIZE-04: Send oversized completed callback"
        id: oversized_cb
        continue-on-error: true
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: success
          test-results: "@/tmp/huge_results.json"

      - name: "SIZE-04: Summary"
        if: always()
        run: |
          echo "## SIZE-04: Oversized Payload" >> $GITHUB_STEP_SUMMARY
          OUTCOME="${{ steps.oversized_cb.outcome }}"
          if [ "$OUTCOME" = "failure" ]; then
            echo "✅ Oversized payload correctly rejected" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Oversized payload was accepted (outcome=$OUTCOME)" >> $GITHUB_STEP_SUMMARY
            echo "The 2MB limit may apply at HUD API, not at callback action." >> $GITHUB_STEP_SUMMARY
          fi
