name: "CRCR Nightly: RHEL 9.6 Build & Test"

on:
  schedule:
    - cron: "0 4 * * *"  # daily at 04:00 UTC
  workflow_dispatch:

run-name: >-
  [Nightly] RHEL 9.6 @ ${{ github.event_name == 'schedule' && 'cron' || 'manual' }}

env:
  UPSTREAM_REPO: pytorch/pytorch
  NIGHTLY_BRANCH: nightly

permissions:
  contents: read

jobs:
  build:
    runs-on: linux.rhel96
    timeout-minutes: 180
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      prev_sha: ${{ steps.sha.outputs.prev_sha }}
      image_tag: ${{ steps.sha.outputs.image_tag }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Fetch source SHAs from nightly branch
        id: sha
        run: |
          NIGHTLY_COMMITS=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/commits?sha=${NIGHTLY_BRANCH}&per_page=2" | jq -r '.[].sha')
          NIGHTLY_SHA=$(echo "$NIGHTLY_COMMITS" | head -1)
          PREV_NIGHTLY_SHA=$(echo "$NIGHTLY_COMMITS" | tail -1)

          if [ -z "$NIGHTLY_SHA" ]; then
            echo "::error::Could not resolve HEAD for ${UPSTREAM_REPO}/${NIGHTLY_BRANCH}"
            exit 1
          fi

          extract_source_sha() {
            local COMMIT_MSG=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/commits/$1" | jq -r '.commit.message')
            echo "$COMMIT_MSG" | grep -oP '\(([a-f0-9]{40})\)' | tr -d '()'
          }

          SOURCE_SHA=$(extract_source_sha "$NIGHTLY_SHA")
          if [ -z "$SOURCE_SHA" ]; then
            echo "::error::Could not extract source SHA from latest nightly commit"
            exit 1
          fi

          PREV_SOURCE_SHA=$(extract_source_sha "$PREV_NIGHTLY_SHA")
          if [ -z "$PREV_SOURCE_SHA" ]; then
            echo "::warning::Could not extract previous source SHA, will run full test suite"
            PREV_SOURCE_SHA=""
          fi

          echo "Source main SHA (current): $SOURCE_SHA"
          echo "Source main SHA (previous): $PREV_SOURCE_SHA"
          echo "sha=$SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "prev_sha=$PREV_SOURCE_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=rhel9-pytorch-nightly:${SOURCE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build container image
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.image_tag }}
          PYTORCH_SHA: ${{ steps.sha.outputs.sha }}
          SUBSCRIPTION_KEY: ${{ secrets.RHEL_SUBSCRIPTION_ACTIVATION_KEY }}
          SUBSCRIPTION_ORG: ${{ secrets.RHEL_SUBSCRIPTION_ORG_ID }}
        run: |
          echo "$SUBSCRIPTION_KEY" > /tmp/sub_key.txt
          echo "$SUBSCRIPTION_ORG" > /tmp/sub_org.txt

          podman build \
            --file docker/Dockerfile.rhel9 \
            --build-arg COMMIT_HASH="${PYTORCH_SHA}" \
            --build-arg ENABLE_SUBSCRIPTION=true \
            --build-arg RHEL_OS_VERSION=9.6 \
            --secret id=subscription_key,src=/tmp/sub_key.txt \
            --secret id=subscription_org,src=/tmp/sub_org.txt \
            --tag "${IMAGE_TAG}" \
            .

          rm -f /tmp/sub_key.txt /tmp/sub_org.txt

      - name: Build summary
        env:
          IMAGE_TAG: ${{ steps.sha.outputs.image_tag }}
          PYTORCH_SHA: ${{ steps.sha.outputs.sha }}
        run: |
          echo "## CRCR Nightly: RHEL 9.6 — Build" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly SHA | [\`${PYTORCH_SHA}\`](https://github.com/pytorch/pytorch/commit/${PYTORCH_SHA}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${IMAGE_TAG}\` |" >> $GITHUB_STEP_SUMMARY

  determine-tests:
    needs: build
    runs-on: linux.rhel96
    timeout-minutes: 15
    outputs:
      cpu_tests: ${{ steps.resolve.outputs.cpu_tests }}
      inductor_tests: ${{ steps.resolve.outputs.inductor_tests }}
      sgpu_tests: ${{ steps.resolve.outputs.sgpu_tests }}
      mgpu_tests: ${{ steps.resolve.outputs.mgpu_tests }}
      mode: ${{ steps.resolve.outputs.mode }}
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PYTORCH_SHA: ${{ needs.build.outputs.sha }}
      PREV_SHA: ${{ needs.build.outputs.prev_sha }}
    steps:
      - name: Checkout CI repo
        uses: actions/checkout@v4

      - name: Resolve test lists
        id: resolve
        run: |
          MODE="full"
          if [ -n "${PREV_SHA}" ]; then
            echo "Delta mode: comparing ${PREV_SHA:0:10}..${PYTORCH_SHA:0:10}"
            # TorchTalk is pre-installed in the image; use merge_test_results.py
            # for heuristic + structural analysis
            ALL_RESULTS=$(podman run --rm -v "$(pwd)/scripts:/ci_scripts:ro" "${IMAGE_TAG}" bash -c "
              source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
              cd /pytorch
              for cat in cpu inductor sgpu mgpu; do
                CMDS=\$(python /ci_scripts/merge_test_results.py '${PREV_SHA}' '${PYTORCH_SHA}' --pytorch-dir /pytorch --category \$cat --commands-only 2>&1) || true
                echo \":::\${cat}:::\"
                echo \"\$CMDS\"
              done
            " 2>&1) || true
            echo "Raw output from container:"
            echo "$ALL_RESULTS"

            # Parse results by category delimiter
            for cat in cpu inductor sgpu mgpu; do
              CMDS=$(echo "$ALL_RESULTS" | sed -n "/:::${cat}:::/,/:::.*:::/{ /:::/d; p; }" | sed '/^$/d')
              if [ -n "$CMDS" ]; then
                MODE="delta"
              fi
              echo "${cat}_tests=$(echo "$CMDS" | base64 -w0)" >> "$GITHUB_OUTPUT"
            done
          fi

          # If delta produced nothing for any category, fill with full suite
          for cat in cpu inductor sgpu mgpu; do
            VAR="${cat}_tests"
            CURRENT=$(grep "^${VAR}=" "$GITHUB_OUTPUT" 2>/dev/null | cut -d= -f2-)
            DECODED=$(echo "$CURRENT" | base64 -d 2>/dev/null || true)
            if [ -z "$DECODED" ]; then
              echo "No delta tests for ${cat}, using full suite"
              FULL=$(python3 scripts/test_config.py "${cat}" --commands-only)
              echo "${cat}_tests=$(echo "$FULL" | base64 -w0)" >> "$GITHUB_OUTPUT"
            fi
          done

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"

      - name: Determination summary
        env:
          CPU_B64: ${{ steps.resolve.outputs.cpu_tests }}
          INDUCTOR_B64: ${{ steps.resolve.outputs.inductor_tests }}
          SGPU_B64: ${{ steps.resolve.outputs.sgpu_tests }}
          MGPU_B64: ${{ steps.resolve.outputs.mgpu_tests }}
        run: |
          echo "## CRCR Nightly: Test Determination" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${{ steps.resolve.outputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | heuristic + TorchTalk (union) |" >> $GITHUB_STEP_SUMMARY
          echo "| Current SHA | \`${PYTORCH_SHA:0:10}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Previous SHA | \`${PREV_SHA:0:10}\` |" >> $GITHUB_STEP_SUMMARY
          for pair in "cpu:$CPU_B64" "inductor:$INDUCTOR_B64" "sgpu:$SGPU_B64" "mgpu:$MGPU_B64"; do
            NAME="${pair%%:*}"
            B64="${pair#*:}"
            COUNT=$(echo "$B64" | base64 -d 2>/dev/null | grep -c '.' || echo 0)
            echo "| ${NAME} tests | ${COUNT} |" >> $GITHUB_STEP_SUMMARY
          done

  cpu-tests:
    needs: [build, determine-tests]
    runs-on: linux.rhel96
    timeout-minutes: 120
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PYTORCH_SHA: ${{ needs.build.outputs.sha }}
    steps:
      - name: Verify image exists
        run: |
          if ! podman image exists "${IMAGE_TAG}"; then
            echo "::error::Image ${IMAGE_TAG} not found in local podman store"
            exit 1
          fi

      - name: Quick sanity gate
        run: |
          podman run --rm "${IMAGE_TAG}" bash -c '
            source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
            python -c "
          import torch, tempfile, os
          print(f\"PyTorch {torch.__version__} loaded\")
          z = torch.randn(64, 64) @ torch.randn(64, 64)
          assert z.shape == (64, 64)
          for dt in [torch.float32, torch.float64, torch.int32, torch.int64, torch.bfloat16]:
              assert torch.ones(8, dtype=dt).dtype == dt
          x = torch.randn(10, requires_grad=True)
          ((x ** 2).sum()).backward()
          assert x.grad is not None and x.grad.shape == x.shape
          m = torch.nn.Linear(16, 4)
          with tempfile.NamedTemporaryFile(suffix=\".pt\", delete=False) as f:
              torch.save(m.state_dict(), f.name)
              torch.nn.Linear(16, 4).load_state_dict(torch.load(f.name, weights_only=True))
              os.unlink(f.name)
          print(\"Quick sanity gate passed\")
          "
          '

      - name: Run CPU test suite
        env:
          TEST_LIST_B64: ${{ needs.determine-tests.outputs.cpu_tests }}
        run: |
          COMMANDS=$(echo "$TEST_LIST_B64" | base64 -d)
          if [ -z "$COMMANDS" ]; then
            echo "No CPU tests to run"
            exit 0
          fi

          echo "Running $(echo "$COMMANDS" | wc -l) CPU test command(s)"
          podman run --rm "${IMAGE_TAG}" bash -c "
            source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
            cd /pytorch
            PASSED=0; FAILED=0; ERRORS=''
            while IFS= read -r cmd; do
              [ -z \"\$cmd\" ] && continue
              echo ''
              echo '============================================================'
              echo \"Running: \$cmd\"
              echo '============================================================'
              if eval \"\$cmd\"; then
                PASSED=\$((PASSED + 1))
              else
                FAILED=\$((FAILED + 1))
                ERRORS=\"\${ERRORS}\n  FAIL: \$cmd\"
              fi
            done <<< '$COMMANDS'
            echo ''
            echo '============================================================'
            echo \"CPU Tests: \${PASSED} passed, \${FAILED} failed\"
            echo '============================================================'
            if [ \$FAILED -gt 0 ]; then
              echo -e \"Failed tests:\${ERRORS}\"
              exit 1
            fi
          "

      - name: Test summary
        if: always()
        run: |
          echo "## CRCR Nightly: RHEL 9.6 — CPU Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly SHA | [\`${PYTORCH_SHA}\`](https://github.com/pytorch/pytorch/commit/${PYTORCH_SHA}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Mode | \`${{ needs.determine-tests.outputs.mode }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  inductor-tests:
    needs: [build, determine-tests, cpu-tests]
    runs-on: linux.rhel96
    timeout-minutes: 120
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PYTORCH_SHA: ${{ needs.build.outputs.sha }}
    steps:
      - name: Verify image exists
        run: |
          if ! podman image exists "${IMAGE_TAG}"; then
            echo "::error::Image ${IMAGE_TAG} not found in local podman store"
            exit 1
          fi

      - name: Run inductor test suite
        env:
          TEST_LIST_B64: ${{ needs.determine-tests.outputs.inductor_tests }}
        run: |
          COMMANDS=$(echo "$TEST_LIST_B64" | base64 -d)
          if [ -z "$COMMANDS" ]; then
            echo "No inductor tests to run"
            exit 0
          fi

          echo "Running $(echo "$COMMANDS" | wc -l) inductor test command(s)"
          podman run --rm "${IMAGE_TAG}" bash -c "
            source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
            cd /pytorch
            PASSED=0; FAILED=0; ERRORS=''
            while IFS= read -r cmd; do
              [ -z \"\$cmd\" ] && continue
              echo ''
              echo '============================================================'
              echo \"Running: \$cmd\"
              echo '============================================================'
              if eval \"\$cmd\"; then
                PASSED=\$((PASSED + 1))
              else
                FAILED=\$((FAILED + 1))
                ERRORS=\"\${ERRORS}\n  FAIL: \$cmd\"
              fi
            done <<< '$COMMANDS'
            echo ''
            echo '============================================================'
            echo \"Inductor Tests: \${PASSED} passed, \${FAILED} failed\"
            echo '============================================================'
            if [ \$FAILED -gt 0 ]; then
              echo -e \"Failed tests:\${ERRORS}\"
              exit 1
            fi
          "

      - name: Test summary
        if: always()
        run: |
          echo "## CRCR Nightly: RHEL 9.6 — Inductor Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly SHA | [\`${PYTORCH_SHA}\`](https://github.com/pytorch/pytorch/commit/${PYTORCH_SHA}) |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | \`${{ job.status }}\` |" >> $GITHUB_STEP_SUMMARY

  sgpu-tests:
    needs: [build, determine-tests, inductor-tests]
    runs-on: linux.rhel96
    timeout-minutes: 90
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PYTORCH_SHA: ${{ needs.build.outputs.sha }}
    steps:
      - name: Check GPU availability
        id: gpu_check
        run: |
          if nvidia-smi &>/dev/null; then
            GPU_COUNT=$(nvidia-smi -L 2>/dev/null | wc -l)
            echo "gpu_available=true" >> "$GITHUB_OUTPUT"
            echo "gpu_count=$GPU_COUNT" >> "$GITHUB_OUTPUT"
            nvidia-smi -L
          else
            echo "gpu_available=false" >> "$GITHUB_OUTPUT"
            echo "gpu_count=0" >> "$GITHUB_OUTPUT"
            echo "No GPU detected — skipping single-GPU tests"
          fi

      - name: Verify image exists
        if: steps.gpu_check.outputs.gpu_available == 'true'
        run: |
          if ! podman image exists "${IMAGE_TAG}"; then
            echo "::error::Image ${IMAGE_TAG} not found in local podman store"
            exit 1
          fi

      - name: Run single-GPU test suite
        if: steps.gpu_check.outputs.gpu_available == 'true'
        env:
          TEST_LIST_B64: ${{ needs.determine-tests.outputs.sgpu_tests }}
        run: |
          COMMANDS=$(echo "$TEST_LIST_B64" | base64 -d)
          if [ -z "$COMMANDS" ]; then
            echo "No sgpu tests to run"
            exit 0
          fi

          echo "Running $(echo "$COMMANDS" | wc -l) single-GPU test command(s)"
          podman run --rm --device nvidia.com/gpu=all "${IMAGE_TAG}" bash -c "
            source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
            cd /pytorch
            PASSED=0; FAILED=0; ERRORS=''
            while IFS= read -r cmd; do
              [ -z \"\$cmd\" ] && continue
              echo ''
              echo '============================================================'
              echo \"Running: \$cmd\"
              echo '============================================================'
              if eval \"\$cmd\"; then
                PASSED=\$((PASSED + 1))
              else
                FAILED=\$((FAILED + 1))
                ERRORS=\"\${ERRORS}\n  FAIL: \$cmd\"
              fi
            done <<< '$COMMANDS'
            echo ''
            echo '============================================================'
            echo \"Single-GPU Tests: \${PASSED} passed, \${FAILED} failed\"
            echo '============================================================'
            if [ \$FAILED -gt 0 ]; then
              echo -e \"Failed tests:\${ERRORS}\"
              exit 1
            fi
          "

      - name: Test summary
        if: always()
        run: |
          echo "## CRCR Nightly: RHEL 9.6 — Single-GPU Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly SHA | [\`${PYTORCH_SHA}\`](https://github.com/pytorch/pytorch/commit/${PYTORCH_SHA}) |" >> $GITHUB_STEP_SUMMARY
          echo "| GPUs | ${{ steps.gpu_check.outputs.gpu_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | \`${{ steps.gpu_check.outputs.gpu_available == 'true' && job.status || 'skipped (no GPU)' }}\` |" >> $GITHUB_STEP_SUMMARY

  mgpu-tests:
    needs: [build, determine-tests, sgpu-tests]
    runs-on: linux.rhel96
    timeout-minutes: 90
    env:
      IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
      PYTORCH_SHA: ${{ needs.build.outputs.sha }}
    steps:
      - name: Check multi-GPU availability
        id: gpu_check
        run: |
          if nvidia-smi &>/dev/null; then
            GPU_COUNT=$(nvidia-smi -L 2>/dev/null | wc -l)
            echo "gpu_count=$GPU_COUNT" >> "$GITHUB_OUTPUT"
            if [ "$GPU_COUNT" -ge 2 ]; then
              echo "mgpu_available=true" >> "$GITHUB_OUTPUT"
              echo "Found $GPU_COUNT GPUs — multi-GPU tests enabled"
            else
              echo "mgpu_available=false" >> "$GITHUB_OUTPUT"
              echo "Only $GPU_COUNT GPU — skipping multi-GPU tests (need 2+)"
            fi
          else
            echo "mgpu_available=false" >> "$GITHUB_OUTPUT"
            echo "gpu_count=0" >> "$GITHUB_OUTPUT"
            echo "No GPU detected — skipping multi-GPU tests"
          fi

      - name: Verify image exists
        if: steps.gpu_check.outputs.mgpu_available == 'true'
        run: |
          if ! podman image exists "${IMAGE_TAG}"; then
            echo "::error::Image ${IMAGE_TAG} not found in local podman store"
            exit 1
          fi

      - name: Run multi-GPU test suite
        if: steps.gpu_check.outputs.mgpu_available == 'true'
        env:
          TEST_LIST_B64: ${{ needs.determine-tests.outputs.mgpu_tests }}
        run: |
          COMMANDS=$(echo "$TEST_LIST_B64" | base64 -d)
          if [ -z "$COMMANDS" ]; then
            echo "No mgpu tests to run"
            exit 0
          fi

          echo "Running $(echo "$COMMANDS" | wc -l) multi-GPU test command(s)"
          podman run --rm --device nvidia.com/gpu=all "${IMAGE_TAG}" bash -c "
            source /miniconda/etc/profile.d/conda.sh && conda activate cuda_torch_build
            cd /pytorch
            PASSED=0; FAILED=0; ERRORS=''
            while IFS= read -r cmd; do
              [ -z \"\$cmd\" ] && continue
              echo ''
              echo '============================================================'
              echo \"Running: \$cmd\"
              echo '============================================================'
              if eval \"\$cmd\"; then
                PASSED=\$((PASSED + 1))
              else
                FAILED=\$((FAILED + 1))
                ERRORS=\"\${ERRORS}\n  FAIL: \$cmd\"
              fi
            done <<< '$COMMANDS'
            echo ''
            echo '============================================================'
            echo \"Multi-GPU Tests: \${PASSED} passed, \${FAILED} failed\"
            echo '============================================================'
            if [ \$FAILED -gt 0 ]; then
              echo -e \"Failed tests:\${ERRORS}\"
              exit 1
            fi
          "

      - name: Test summary
        if: always()
        run: |
          echo "## CRCR Nightly: RHEL 9.6 — Multi-GPU Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Nightly SHA | [\`${PYTORCH_SHA}\`](https://github.com/pytorch/pytorch/commit/${PYTORCH_SHA}) |" >> $GITHUB_STEP_SUMMARY
          echo "| GPUs | ${{ steps.gpu_check.outputs.gpu_count }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Result | \`${{ steps.gpu_check.outputs.mgpu_available == 'true' && job.status || 'skipped (need 2+ GPUs)' }}\` |" >> $GITHUB_STEP_SUMMARY
