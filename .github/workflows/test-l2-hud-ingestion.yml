name: "Test: L2 HUD Ingestion"

on:
  repository_dispatch:
    types:
      - pull_request
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number (manual testing)"
        required: false
        default: "0"

run-name: >-
  [Test HUD] ${{
    github.event.client_payload.event_type == 'pull_request' &&
    format('PR #{0}',
      github.event.client_payload.payload.pull_request.number) ||
    'Manual trigger'
  }}

concurrency:
  group: >-
    test-hud-${{ github.event.client_payload.payload.repository.full_name || 'manual' }}-${{
    github.event.client_payload.payload.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  actions: write
  id-token: write

jobs:
  cancel-workflow:
    if: ${{ github.event.client_payload.payload.action == 'closed' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "PR closed — canceling older runs"

  hud-ingestion:
    if: ${{ github.event.client_payload.payload.action != 'closed' }}
    runs-on: ubuntu-latest
    env:
      PR_NUMBER: ${{ github.event.client_payload.payload.pull_request.number || '0' }}
      HEAD_SHA: ${{ github.event.client_payload.payload.pull_request.head.sha || '' }}
      DOWNSTREAM_REPO: ${{ github.repository }}
    steps:
      - name: "Throttle: stagger callbacks (wave 2)"
        run: sleep 15

      - name: Report in_progress
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: in_progress

      - name: Simulate CI work
        id: tests
        run: |
          sleep 8
          echo "outcome=success" >> "$GITHUB_OUTPUT"
          echo "passed=100" >> "$GITHUB_OUTPUT"
          echo "failed=0" >> "$GITHUB_OUTPUT"
          echo "skipped=5" >> "$GITHUB_OUTPUT"
          echo "total=105" >> "$GITHUB_OUTPUT"

      - name: Report completed
        if: always()
        uses: pytorch/test-infra/.github/actions/cross-repo-ci-relay-callback@main
        with:
          status: completed
          conclusion: ${{ steps.tests.outputs.outcome || 'failure' }}
          test-results: >-
            {
              "passed": ${{ steps.tests.outputs.passed || 0 }},
              "failed": ${{ steps.tests.outputs.failed || 0 }},
              "skipped": ${{ steps.tests.outputs.skipped || 0 }},
              "total": ${{ steps.tests.outputs.total || 0 }}
            }
          artifact-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Wait for HUD propagation
        if: always()
        run: |
          echo "Waiting 30s for DynamoDB → ClickHouse propagation..."
          sleep 30

      - name: "HUD-01/HUD-02/HUD-03: Query HUD and verify record"
        if: always()
        run: |
          echo "## HUD Ingestion Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$PR_NUMBER" = "0" ] || [ -z "$PR_NUMBER" ]; then
            echo "⚠️ Skipping HUD query — no PR number (manual trigger)" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          QUERY_URL="https://hud.pytorch.org/api/clickhouse/oot_pr_results?parameters=%7B%22pr%22%3A${PR_NUMBER}%7D"
          echo "Querying: \`$QUERY_URL\`" >> $GITHUB_STEP_SUMMARY

          RESPONSE=$(curl -sf "$QUERY_URL" 2>&1) || {
            echo "⚠️ HUD API query failed (may need more propagation time)" >> $GITHUB_STEP_SUMMARY
            echo "Response: $RESPONSE" >> $GITHUB_STEP_SUMMARY
            exit 0
          }

          MATCH=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          repo = '$DOWNSTREAM_REPO'
          matches = [r for r in data if r.get('downstream_repo') == repo]
          if matches:
              r = matches[-1]
              print(f'found|{r.get(\"status\",\"\")}'
                    f'|{r.get(\"conclusion\",\"\")}'
                    f'|{r.get(\"pr_number\",\"\")}'
                    f'|{r.get(\"pytorch_head_sha\",\"\")}'
                    f'|{r.get(\"workflow_run_url\",\"\")}')
          else:
              print('notfound')
          " 2>&1) || MATCH="error"

          if [[ "$MATCH" == found* ]]; then
            IFS='|' read -r _ STATUS CONCLUSION PR SHA URL <<< "$MATCH"
            echo "✅ **HUD-01**: Record found for \`$DOWNSTREAM_REPO\` on PR #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "| Field | Expected | Actual |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|----------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| downstream_repo | \`$DOWNSTREAM_REPO\` | ✅ matched |" >> $GITHUB_STEP_SUMMARY
            echo "| pr_number | \`$PR_NUMBER\` | \`$PR\` |" >> $GITHUB_STEP_SUMMARY
            echo "| pytorch_head_sha | \`${HEAD_SHA:0:7}...\` | \`${SHA:0:7}...\` |" >> $GITHUB_STEP_SUMMARY
            echo "| status | \`completed\` | \`$STATUS\` |" >> $GITHUB_STEP_SUMMARY
            echo "| conclusion | \`success\` | \`$CONCLUSION\` |" >> $GITHUB_STEP_SUMMARY
            echo "| workflow_run_url | present | \`${URL:0:60}...\` |" >> $GITHUB_STEP_SUMMARY
          elif [ "$MATCH" = "notfound" ]; then
            echo "⚠️ **HUD-01**: No record found yet for \`$DOWNSTREAM_REPO\` on PR #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
            echo "This may be due to ClickHouse propagation delay. Check again after ~2 minutes." >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **HUD-01**: Error querying HUD API" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$MATCH" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "HUD-04: Check timing metrics"
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### HUD-04: Timing Metrics" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ queue_time and execution_time are relay-computed from Redis timestamps." >> $GITHUB_STEP_SUMMARY
          echo "These can be verified by querying the oot_backend_dashboard ClickHouse query" >> $GITHUB_STEP_SUMMARY
          echo "for \`$DOWNSTREAM_REPO\` and checking non-null queue_time/execution_time." >> $GITHUB_STEP_SUMMARY

      - name: "HUD-05: Verify workflow URL"
        if: always()
        run: |
          EXPECTED_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### HUD-05: Workflow URL" >> $GITHUB_STEP_SUMMARY
          echo "✅ Expected workflow_run_url: \`$EXPECTED_URL\`" >> $GITHUB_STEP_SUMMARY

      - name: "HUD-06: UpdateItem merge note"
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### HUD-06: UpdateItem Merge Semantics" >> $GITHUB_STEP_SUMMARY
          echo "ℹ️ The completed callback uses DynamoDB UpdateItem (not PutItem)." >> $GITHUB_STEP_SUMMARY
          echo "Fields from the in_progress callback (started_at, queue_time) are" >> $GITHUB_STEP_SUMMARY
          echo "preserved because only non-undefined fields are SET." >> $GITHUB_STEP_SUMMARY
          echo "This can be verified by checking that a completed record has both" >> $GITHUB_STEP_SUMMARY
          echo "started_at and completed_at populated." >> $GITHUB_STEP_SUMMARY
